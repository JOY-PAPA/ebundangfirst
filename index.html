<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>e편한세상 분당 퍼스트빌리지 옵션 계산기</title>
  <meta name="description" content="e편한세상 분당 퍼스트빌리지 옵션 선택 금액 체크 계산기" />
  <meta property="og:title" content="e편한세상 분당 퍼스트빌리지 옵션 계산기" />
  <meta property="og:description" content="주택형별 옵션을 체크하고 선택금액을 바로 계산하세요." />
  <meta name="theme-color" content="#173b35" />
  <link rel="stylesheet" href="./styles.css?v=20260706-navy1" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">입주 예정자 협의회 제공</p>
      <h1>e편한세상 분당 퍼스트빌리지<br />옵션 계산기</h1>
    </div>
    <p id="dataVersion" class="data-version">데이터 확인 중</p>
  </header>

  <main class="shell">
    <section class="controls" aria-label="옵션 검색 및 필터">
      <div class="field">
        <label for="typeSelect">주택형</label>
        <select id="typeSelect"></select>
      </div>
      <div class="field field--search">
        <label for="searchInput">옵션 검색</label>
        <input id="searchInput" type="search" placeholder="품목, 구성, 제조사 검색" autocomplete="off" />
      </div>
      <div class="field">
        <label for="categoryFilter">구분</label>
        <select id="categoryFilter"></select>
      </div>
      <label class="check-toggle">
        <input id="hideUnavailable" type="checkbox" checked />
        <span>선택 불가 숨기기</span>
      </label>
    </section>

    <section class="notice" role="note">
      <strong>안내</strong>
      <span>택1 그룹은 하나를 선택하면 같은 그룹의 기존 선택이 자동 해제됩니다. 조건 문구가 있는 옵션은 선택 후 점검사항을 확인해 주세요.</span>
    </section>

    <div class="workspace">
      <section class="options-panel" aria-label="옵션 선택">
        <div class="panel-head">
          <div>
            <h2>옵션 선택</h2>
            <p id="resultCount">0개 표시 중</p>
          </div>
          <div class="head-actions">
            <button id="expandAllBtn" type="button" class="button button--soft">전체 펼치기</button>
            <button id="collapseAllBtn" type="button" class="button button--soft">전체 접기</button>
          </div>
        </div>
        <div id="optionList" class="option-list" aria-live="polite"></div>
      </section>

      <aside class="summary" aria-label="선택 요약">
        <section class="summary-total">
          <p>총 선택금액</p>
          <strong id="totalAmount">0원</strong>
          <span id="selectedCount">선택 0개</span>
        </section>

        <section class="summary-box">
          <h3>구분별 합계</h3>
          <div id="categoryTotals" class="stack"></div>
        </section>

        <section id="warningBox" class="summary-box">
          <h3>점검사항</h3>
          <div id="warnings" class="stack"></div>
        </section>

        <section class="summary-box">
          <h3>선택 내역</h3>
          <div id="selectedList" class="stack"></div>
        </section>

        <div class="summary-actions">
          <button id="copySummaryBtn" type="button" class="button">선택내역 복사</button>
          <button id="shareLinkBtn" type="button" class="button button--outline">공유 링크 복사</button>
          <button id="downloadCsvBtn" type="button" class="button button--outline">CSV 다운로드</button>
          <button id="printBtn" type="button" class="button button--outline">인쇄 / PDF</button>
          <button id="resetBtn" type="button" class="button button--danger">초기화</button>
        </div>
      </aside>
    </div>
  </main>

  <div class="mobile-total" aria-label="모바일 선택 요약">
    <div>
      <span>총 선택금액</span>
      <strong id="mobileTotalAmount">0원</strong>
    </div>
    <button id="mobileSummaryBtn" type="button" class="button button--outline">내역 보기</button>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="./option-data.js?v=20260706-navy1"></script>
  <script src="./app.js?v=20260706-navy1"></script>
</body>
</html>
